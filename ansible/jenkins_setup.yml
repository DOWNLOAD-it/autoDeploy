---
- name: Clean and Configure Jenkins Server with K8s Access
  hosts: jenkins
  become: yes
  gather_facts: yes

  vars:
    # Use the Master's Private IP
    master_private_ip: "172.31.32.84"

  tasks:
    # -----------------------------
    # 1. NUCLEAR CLEANUP (Reset to Zero)
    # -----------------------------
    - name: Wipe existing Jenkins, Java, and Apt leftovers
      shell: |
        apt-get purge -y jenkins openjdk* || true
        apt-get autoremove -y
        apt-get clean
        rm -rf /var/lib/jenkins
        rm -rf /etc/default/jenkins
        rm -f /etc/apt/sources.list.d/jenkins.list
        rm -f /etc/apt/keyrings/jenkins.gpg
        rm -rf /home/admin/.kube
        rm -rf /var/lib/jenkins/.kube
      ignore_errors: yes

    - name: Kill any hanging apt processes
      shell: "killall apt apt-get || true"
      ignore_errors: yes

    # -----------------------------
    # 2. INSTALL TOOLS (Docker, Java, Kubectl)
    # -----------------------------
    - name: Install system dependencies
      apt:
        name: [curl, gnupg, fontconfig, openjdk-17-jre-headless, docker.io]
        state: present
        update_cache: yes

    - name: Install kubectl binary
      shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
      args:
        creates: /usr/local/bin/kubectl

    # -----------------------------
    # 3. JENKINS INSTALLATION
    # -----------------------------
    - name: Create keyring directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    # 2. JENKINS REPOSITORY SETUP
    - name: Download latest Jenkins 2026 GPG key
      ansible.builtin.get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins.asc
        mode: "0644"
        force: yes # Overwrites the old/broken key if it exists

    - name: Add Jenkins apt repository (LTS)
      ansible.builtin.apt_repository:
        # Crucial: This path must exactly match the 'dest' above
        repo: "deb [signed-by=/etc/apt/keyrings/jenkins.asc] https://pkg.jenkins.io/debian-stable binary/"
        state: present
        filename: jenkins
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present
        update_cache: yes

    # -----------------------------
    # 4. KUBECONFIG AUTHORIZATION
    # -----------------------------
    - name: Create Jenkins .kube directory
      file:
        path: /var/lib/jenkins/.kube
        state: directory
        owner: jenkins
        group: jenkins
        mode: "0700"

    - name: Copy K3s config from Master to Jenkins
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /var/lib/jenkins/.kube/config
        owner: jenkins
        group: jenkins
        mode: "0600"
        remote_src: no

    - name: Update K3s config to use Private IP
      replace:
        path: /var/lib/jenkins/.kube/config
        regexp: "127.0.0.1"
        replace: "{{ master_private_ip }}"

    # -----------------------------
    # 5. PERMISSIONS & RAM
    # -----------------------------
    - name: Add Jenkins to Docker group
      user:
        name: jenkins
        groups: docker
        append: yes

    - name: Limit Jenkins RAM usage
      lineinfile:
        path: /etc/default/jenkins
        regexp: "^JAVA_ARGS="
        line: 'JAVA_ARGS="-Xmx512m -Djava.awt.headless=true"'
      notify: Restart Jenkins

    - name: Ensure services are running
      service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop: [docker, jenkins]

  handlers:
    - name: Restart Jenkins
      service:
        name: jenkins
        state: restarted
